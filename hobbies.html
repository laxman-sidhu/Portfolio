<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hobbies · Laxman Sawant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/hobbies.css" />
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Laxman<span>.</span></a>
      <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="hobbies.html" class="active">Hobbies</a></li>
        <li><a href="index.html#contact" class="nav-cta">Let's talk</a></li>
      </ul>
    </div>
  </nav>

  <header class="page-hero">
    <div class="shell">
      <span class="eyebrow">Beyond the data</span>
      <h1 class="page-title">Life in <em>Motion</em></h1>
      <p class="page-desc">A glimpse into what keeps me inspired, active, and balanced. Tap any photo or clip to view it full screen.</p>
    </div>
  </header>

  <!-- hobby sections render here from hobbies-config.js + hobbies-media.js -->
  <main id="hobbiesRoot"></main>

  <!-- lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lb-btn lb-close" id="lbClose" aria-label="Close">&times;</button>
    <button class="lb-btn lb-prev" id="lbPrev" aria-label="Previous">&lsaquo;</button>
    <button class="lb-btn lb-next" id="lbNext" aria-label="Next">&rsaquo;</button>
    <div class="lb-stage" id="lbStage">
      <p class="lb-caption" id="lbCaption"></p>
    </div>
  </div>

  <footer class="footer">
    <div class="shell">
      <div class="footer-bottom" style="border:none;">
        <span class="footer-logo">Laxman<span>.</span></span>
        <p>© 2026 Laxman Sawant · Keep moving, keep creating.</p>
        <div class="social-icons">
          <a class="social-icon" href="https://www.instagram.com/sawant_sidhu/" target="_blank" rel="noopener" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
          <a class="social-icon" href="https://www.youtube.com/@laxmansawant19" target="_blank" rel="noopener" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
        </div>
      </div>
    </div>
  </footer>

  <!-- Markup templates: hobby sections and media tiles are built from these -->
  <template id="tpl-hobby-block">
    <section class="hobby-block">
      <div class="shell">
        <div class="hobby-head reveal">
          <span class="eyebrow"></span>
          <h2><span class="hobby-icon"></span> <span class="em"></span></h2>
          <p class="hobby-text"></p>
          <span class="hobby-count"><i class="fa-solid fa-image"></i> <span class="hobby-count-text"></span></span>
        </div>
      </div>
      <div class="shell-fluid"><div class="media-grid reveal"></div></div>
    </section>
  </template>

  <template id="tpl-media-image">
    <div class="media-item" data-type="image"><img loading="lazy" decoding="async"></div>
  </template>
  <template id="tpl-media-video">
    <div class="media-item is-video" data-type="video">
      <video muted loop playsinline preload="metadata"></video>
      <span class="vid-badge"><i class="fa-solid fa-volume-high"></i></span>
    </div>
  </template>
  <template id="tpl-media-empty">
    <p class="media-empty">No media yet — add files to <code></code> and run update-hobbies.bat.</p>
  </template>

  <script defer src="js/main/main.js"></script>
  <script defer src="js/config/hobbies-config.js"></script>
  <script defer src="js/config/hobbies-media.js"></script>
  <script defer src="js/main/hobbies-render.js"></script>
</body>
</html>
